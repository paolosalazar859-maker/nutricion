<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reserva tu Hora - Nutrición</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            background-color: var(--bg-main);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }
        .container {
            width: 100%;
            max-width: 500px;
        }
        .prof-info {
            text-align: center;
            margin-bottom: 2rem;
        }
        .prof-avatar {
            width: 80px;
            height: 80px;
            background: var(--primary);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            margin: 0 auto 1rem;
            font-weight: 800;
        }
        .booking-step {
            margin-bottom: 2rem;
        }
        .time-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 0.5rem;
            margin-top: 1rem;
        }
        .time-btn {
            padding: 0.5rem;
            border: 1px solid #ddd;
            border-radius: 8px;
            background: white;
            cursor: pointer;
            text-align: center;
            font-weight: 500;
            transition: all 0.2s;
        }
        .time-btn:hover {
            border-color: var(--primary);
            background: rgba(109, 40, 217, 0.05);
        }
        .time-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="glass-card">
            <div class="prof-info">
                <div class="prof-avatar" id="prof-avatar">PS</div>
                <h2 id="prof-name">Cargando...</h2>
                <p id="prof-specialty" style="color: var(--text-muted)">Nutricionista</p>
                <div style="margin-top: 0.5rem; font-size: 0.85rem; color: var(--text-muted);">
                    <span id="prof-sis"></span> <br>
                    <span id="prof-university"></span>
                </div>
            </div>

            <div class="booking-step">
                <h3 style="margin-bottom: 1rem;">1. Selecciona el Día</h3>
                <div class="calendar-container" style="box-shadow: none; padding: 0;">
                    <div class="calendar-header">
                        <h4 id="current-month">Abril 2024</h4>
                        <div style="display: flex; gap: 5px;">
                            <button class="btn" id="prev-month"><i data-lucide="chevron-left"></i></button>
                            <button class="btn" id="next-month"><i data-lucide="chevron-right"></i></button>
                        </div>
                    </div>
                    <div class="calendar-grid" id="calendar-grid">
                        <div class="day-name">LU</div><div class="day-name">MA</div><div class="day-name">MI</div>
                        <div class="day-name">JU</div><div class="day-name">VI</div><div class="day-name">SA</div><div class="day-name">DO</div>
                    </div>
                </div>
            </div>

            <div class="booking-step">
                <h3>2. Selecciona la Hora</h3>
                <div class="time-grid" id="time-grid">
                    <!-- Los botones de hora se generarán dinámicamente -->
                </div>
            </div>

            <div style="margin-top: 2rem;">
                <button class="btn btn-primary" id="request-booking" style="width: 100%; padding: 1rem;">
                    Agendar por WhatsApp
                </button>
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        
        // Parse time: "0900" -> "09:00"
        const formatTime = (raw) => raw.substring(0,2) + ":" + raw.substring(2,4);

        // Process Weekly: "209001400,..."
        const schRaw = urlParams.get('sch') || "209001400,209001400,209001400,209001400,109001400,009001400,009001400";
        const weekly = schRaw.split(',').map(item => ({
            m: item[0],
            s: formatTime(item.substring(1,5)),
            e: formatTime(item.substring(5,9))
        }));

        // Process Overrides: "20240417_m_ss_ee"
        const ovRaw = urlParams.get('ov') || "";
        const overrides = {};
        if (ovRaw) {
            ovRaw.split(',').forEach(pair => {
                const [datePart, val] = pair.split('_');
                const formattedDate = `${datePart.substring(0,4)}-${datePart.substring(4,6)}-${datePart.substring(6,8)}`;
                overrides[formattedDate] = {
                    m: val[0],
                    s: formatTime(val.substring(1,5)),
                    e: formatTime(val.substring(5,9))
                };
            });
        }

        const config = {
            name: urlParams.get('n') || "Nutricionista",
            specialty: urlParams.get('s') || "Especialista en Salud",
            whatsapp: urlParams.get('wa') || "56912345678",
            sis: urlParams.get('sis') || "",
            university: urlParams.get('u') || "",
            blocked: (urlParams.get('blk') || "").split(','),
            weekly: weekly,
            overrides: overrides
        };

        const MODALITY_LABELS = { '0': 'Cerrado', '1': '💻 Atención Online', '2': '🏢 Consulta Presencial' };

        let selectedDate = new Date();
        let selectedTime = null;
        let currentDate = new Date();

        function init() {
            document.getElementById('prof-name').innerText = config.name;
            document.getElementById('prof-avatar').innerText = config.name.split(' ').map(n=>n[0]).join('').substring(0,2).toUpperCase();
            document.getElementById('prof-specialty').innerText = config.specialty;
            if (config.sis) document.getElementById('prof-sis').innerText = "Reg. SIS: " + config.sis;
            if (config.university) document.getElementById('prof-university').innerText = config.university;
            
            renderCalendar();
            renderTimeSlots();
            setupEvents();
            lucide.createIcons();
        }

        function getDayConfig(date) {
            const dateStr = date.toISOString().split('T')[0];
            if (config.overrides[dateStr]) return config.overrides[dateStr];
            let dayIdx = date.getDay();
            let schIdx = dayIdx === 0 ? 6 : dayIdx - 1;
            return config.weekly[schIdx];
        }

        function isDayBlocked(date) {
            const dateStr = date.toISOString().split('T')[0];
            if (config.blocked.includes(dateStr)) return true;
            return getDayConfig(date).m === '0';
        }

        function renderCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            const monthNames = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
            document.getElementById('current-month').innerText = `${monthNames[month]} ${year}`;

            const grid = document.getElementById('calendar-grid');
            const headers = Array.from(grid.querySelectorAll('.day-name'));
            grid.innerHTML = '';
            headers.forEach(h => grid.appendChild(h));

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            let startOffset = firstDay === 0 ? 6 : firstDay - 1;

            for (let i = 0; i < startOffset; i++) {
                grid.appendChild(Object.assign(document.createElement('div'), {className: 'calendar-day empty'}));
            }

            for (let day = 1; day <= daysInMonth; day++) {
                const dayDiv = document.createElement('div');
                dayDiv.className = 'calendar-day';
                dayDiv.innerText = day;
                const d = new Date(year, month, day);
                
                if (isDayBlocked(d)) {
                    dayDiv.classList.add('empty');
                    dayDiv.style.opacity = '0.3';
                    dayDiv.style.cursor = 'not-allowed';
                } else {
                    if (day === new Date().getDate() && month === new Date().getMonth() && year === new Date().getFullYear()) dayDiv.classList.add('today');
                    if (selectedDate && selectedDate.getDate() === day && selectedDate.getMonth() === month) {
                        dayDiv.style.borderColor = 'var(--primary)';
                        dayDiv.style.background = 'rgba(109, 40, 217, 0.1)';
                    }
                    dayDiv.onclick = () => {
                        selectedDate = d;
                        renderCalendar();
                        renderTimeSlots();
                        updateModalityUI();
                    };
                }
                grid.appendChild(dayDiv);
            }
        }

        function renderTimeSlots() {
            const container = document.getElementById('time-grid');
            container.innerHTML = '';
            const dayConfig = getDayConfig(selectedDate);
            if (dayConfig.m === '0') {
                container.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: var(--text-muted); font-size: 0.8rem;">Día no laborable</p>';
                return;
            }

            const startH = parseInt(dayConfig.s.split(':')[0]);
            const endH = parseInt(dayConfig.e.split(':')[0]);

            for (let h = startH; h <= endH; h++) {
                const timeStr = `${String(h).padStart(2, '0')}:00`;
                const btn = document.createElement('div');
                btn.className = 'time-btn';
                if (selectedTime === timeStr) btn.classList.add('active');
                btn.innerText = timeStr;
                btn.onclick = () => {
                    document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    selectedTime = timeStr;
                };
                container.appendChild(btn);
            }
        }

        function updateModalityUI() {
            const dayConfig = getDayConfig(selectedDate);
            const label = MODALITY_LABELS[dayConfig.m];
            const infoDiv = document.getElementById('modality-info') || document.createElement('div');
            infoDiv.id = 'modality-info';
            infoDiv.style = "margin-top: 1rem; font-size: 0.85rem; font-weight: 600; color: var(--primary); text-align: center; background: rgba(109, 40, 217, 0.05); padding: 0.5rem; border-radius: 8px;";
            infoDiv.innerText = `${label} (${dayConfig.s} - ${dayConfig.e})`;
            document.getElementById('time-grid').parentNode.insertBefore(infoDiv, document.getElementById('time-grid'));
        }

        function setupEvents() {
            document.getElementById('prev-month').onclick = () => { currentDate.setMonth(currentDate.getMonth() - 1); renderCalendar(); };
            document.getElementById('next-month').onclick = () => { currentDate.setMonth(currentDate.getMonth() + 1); renderCalendar(); };

            document.getElementById('request-booking').onclick = () => {
                if (!selectedTime) { alert('Por favor selecciona una hora.'); return; }
                const dateStr = selectedDate.toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'long' });
                const message = encodeURIComponent(`Hola ${config.name}, me gustaría agendar una hora para el ${dateStr} a las ${selectedTime}.`);
                window.open(`https://wa.me/${config.whatsapp}?text=${message}`);
            };
        }

        init();
    </script>
</body>
</html>
